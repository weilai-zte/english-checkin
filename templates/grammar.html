<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语法练习 - 初一英语</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", sans-serif;
         background: linear-gradient(135deg, #11998e, #38ef7d);
         min-height: 100vh; padding: 20px; }
  .container { max-width: 480px; margin: 0 auto; }
  h1 { color: white; font-size: 22px; text-align: center; margin-bottom: 16px; }
  .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 16px;
          box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .rule-box { background: #e8f5e9; border-radius: 12px; padding: 12px; margin-bottom: 16px;
              font-size: 14px; color: #2e7d32; border-left: 4px solid #4caf50; }
  .example { background: #f0f4ff; border-radius: 10px; padding: 12px; margin-bottom: 8px; }
  .example-en { color: #333; font-size: 15px; }
  .example-cn { color: #888; font-size: 13px; margin-top: 4px; }
  .q-card { background: #f8f9ff; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .q-num { font-size: 12px; color: #888; margin-bottom: 6px; }
  .q-text { font-size: 15px; color: #333; margin-bottom: 10px; line-height: 1.5; }
  .q-input { width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 10px;
             font-size: 15px; font-family: inherit; outline: none;
             transition: border-color 0.2s; }
  .q-input:focus { border-color: #667eea; }
  .hint { font-size: 12px; color: #f0ad4e; margin-top: 4px; }
  .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 14px;
         font-size: 18px; font-weight: bold; cursor: pointer; text-align: center;
         background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
  .result-card { border-radius: 14px; padding: 16px; margin-bottom: 10px; }
  .result-correct { background: #e8f5e9; border-left: 4px solid #4caf50; }
  .result-wrong { background: #ffebee; border-left: 4px solid #f44336; }
  .result-q { font-size: 14px; color: #666; margin-bottom: 4px; }
  .result-a { font-size: 15px; color: #333; }
  .result-user { font-size: 14px; margin-top: 2px; }
  .score-big { font-size: 64px; font-weight: bold; text-align: center;
               color: #667eea; margin-bottom: 8px; }
  .score-label { text-align: center; color: #888; font-size: 16px; margin-bottom: 20px; }
  .streak-badge { text-align: center; font-size: 20px; color: #e67e22; margin-top: 12px; }
</style>
</head>
<body>
<div class="container">
  <h1>✍️ 语法练习 · {{ grammar.title }}</h1>

  <div id="exercise-area">
    <div class="card">
      <div class="rule-box">📖 {{ grammar.rule }}</div>

      {% for ex in grammar.examples %}
      <div class="example">
        <div class="example-en">{{ ex.句 }}</div>
        <div class="example-cn">{{ ex.翻译 }}</div>
      </div>
      {% endfor %}
    </div>

    <div class="card">
      <form id="grammar-form">
        {% for ex in grammar.exercises %}
        <div class="q-card">
          <div class="q-num">第 {{ loop.index }} 题</div>
          <div class="q-text">{{ ex.question }}</div>
          <input type="text" class="q-input" name="q{{ loop.index0 }}"
                 placeholder="填写答案..." autocomplete="off" />
          <div class="hint">💡 提示：{{ ex.hint }}</div>
        </div>
        {% endfor %}
        <button type="submit" class="btn">提交答案 ✅</button>
      </form>
    </div>
  </div>

  <div id="result-area" style="display:none;">
    <div class="card">
      <div class="score-big" id="score-num"></div>
      <div class="score-label">得分</div>
      <div id="result-list"></div>
      <a href="/" class="btn" style="margin-top:16px;">🏠 返回首页</a>
      <div class="streak-badge" id="streak-display"></div>
    </div>
  </div>
</div>

<script>
const form = document.getElementById("grammar-form");
const answers = {{ grammar.exercises|tojson }};

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const fd = new FormData(form);
  const data = {};
  answers.forEach((a, i) => { data[a.question] = fd.get("q"+i) || ""; });

  const res = await fetch("/grammar", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ answers: data })
  });
  const json = await res.json();

  document.getElementById("exercise-area").style.display = "none";
  document.getElementById("result-area").style.display = "block";
  document.getElementById("score-num").textContent = json.correct + "/" + json.total;
  document.getElementById("streak-display").textContent =
    json.streak > 0 ? "🔥 连续 " + json.streak + " 天打卡！" : "";

  const list = document.getElementById("result-list");
  json.results.forEach(r => {
    const cls = r.is_correct ? "result-correct" : "result-wrong";
    const icon = r.is_correct ? "✅" : "❌";
    list.innerHTML += `
      <div class="result-card ${cls}">
        <div class="result-q">${icon} ${r.question}</div>
        <div class="result-a">正确答案：${r.correct}</div>
        ${!r.is_correct ? `<div class="result-user">你的答案：${r.user || '(空)'}</div>` : ""}
      </div>`;
  });
});
</script>
</body>
</html>
