<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中译英练习</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: linear-gradient(135deg, #11998e, #38ef7d);
           min-height: 100vh; padding: 20px; }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { text-align: center; color: white; font-size: 22px; margin-bottom: 8px; }
    .subtitle { text-align: center; color: rgba(255,255,255,0.75); font-size: 14px; margin-bottom: 20px; }

    .question-card {
      background: #f5f5f7; border-radius: 16px; padding: 20px; margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .question-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; font-size: 13px; color: #777;
    }
    .question-num { font-weight: 600; color: #667eea; }
    .difficulty-badge {
      padding: 2px 10px; border-radius: 12px; font-size: 12px;
      background: #e0e7ff; color: #667eea;
    }
    .cn-sentence {
      font-size: 18px; color: #1a1a2e; margin-bottom: 12px;
      padding: 10px 14px; background: #eef0f5; border-radius: 8px;
      border-left: 4px solid #667eea;
    }
    .en-display {
      display: flex; flex-wrap: wrap; gap: 6px 4px; align-items: center;
      margin-bottom: 14px; min-height: 40px;
    }
    .word-text {
      font-size: 18px; color: #1a1a2e; font-weight: 500;
      padding: 4px 2px;
    }
    .word-input {
      font-size: 18px; border: none; border-bottom: 2px solid #667eea;
      background: transparent; text-align: center; outline: none; color: #1a1a2e;
      min-width: 60px; max-width: 200px; padding: 4px 2px;
      transition: border-color 0.2s, color 0.2s;
    }
    .word-input.correct { border-color: #22c55e; color: #22c55e; }
    .word-input.wrong   { border-color: #ef4444; color: #ef4444; }
    .hint-row { font-size: 13px; color: #f59e0b; }
    .result-overlay {
      padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 15px;
    }
    .result-correct   { background: #dcfce7; color: #166534; }
    .result-partial  { background: #fef9c3; color: #854d0e; }
    .result-wrong    { background: #fee2e2; color: #991b1b; }
    .blank-result { font-weight: 600; }
    .blank-result.correct { color: #22c55e; }
    .blank-result.wrong   { color: #ef4444; }

    .btn-primary {
      display: block; width: 100%; padding: 16px; font-size: 18px; font-weight: 600;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 14px; cursor: pointer; margin-top: 10px;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .score-banner {
      text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 20px;
      padding: 20px; background: white; border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .score-banner .big { font-size: 48px; color: #667eea; }
  </style>
</head>
<body>
<div class="container">
  <h1>🖊 中译英练习</h1>
  <p class="subtitle">把空格里的词填完整，写对变绿</p>

  <div id="score-banner" style="display:none" class="score-banner">
    本次得分：<span class="big" id="score-num"></span> / <span id="score-total"></span>
  </div>

  <form id="quiz-form" onsubmit="return false">
    {% for s in sentences %}
    <div class="question-card" id="card-{{ loop.index0 }}">
      <div class="question-header">
        <span class="question-num">第 {{ loop.index }} / {{ sentences|length }} 题</span>
        <span class="difficulty-badge">{{ difficulty }}</span>
      </div>
      <div class="cn-sentence">{{ s.cn }}</div>
      <div class="en-display" id="display-{{ loop.index0 }}">
        {% for w in s.words_display %}
          {% if w.type == "text" %}
            <span class="word-text">{{ w.text }}</span>
          {% elif w.type == "input" %}
            <input type="text"
                   class="word-input"
                   id="blank-{{ loop.index0 }}-{{ w.idx }}"
                   data-target="{{ w.word }}"
                   placeholder="{{ w.hint }}"
                   autocomplete="off"
                   spellcheck="false"
                   style="width:{{ [w.hint|length * 10, 70]|max }}px">
          {% endif %}
        {% endfor %}
      </div>
      <div class="hint-row">💡 {{ s.hint }}</div>
      <div id="result-{{ loop.index0 }}" style="display:none"></div>
    </div>
    {% endfor %}

    <button class="btn-primary" id="submit-btn" onclick="submitAll()">提交答案</button>
  </form>
</div>

<script>
// ── 实时高亮：写对变绿 ─────────────────────────────────────────
document.querySelectorAll('.word-input').forEach(input => {
  input.addEventListener('input', () => {
    const target = input.dataset.target.replace(/[^a-zA-Z']/g, '').toLowerCase();
    const val    = input.value.replace(/[^a-zA-Z']/g, '').toLowerCase();
    if (!val) {
      input.classList.remove('correct', 'wrong');
    } else if (val === target) {
      input.classList.add('correct');
      input.classList.remove('wrong');
    } else if (target.startsWith(val) && val.length >= target.length * 0.6) {
      // 部分对，不变红但也不算绿
      input.classList.remove('correct', 'wrong');
    } else {
      input.classList.add('wrong');
      input.classList.remove('correct');
    }
  });
});

// ── 提交 ──────────────────────────────────────────────────────
async function submitAll() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '批改中…';

  // 收集答案
  const answers = [];
  document.querySelectorAll('.question-card').forEach((_, qi) => {
    const blanks = {};
    document.querySelectorAll(`[id^="blank-${qi}-"]`).forEach(inp => {
      const idx = inp.id.split('-').pop();
      blanks[idx] = inp.value;
    });
    answers.push(blanks);
  });

  const res  = await fetch('/translate/check', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ answers })
  });
  const data = await res.json();

  // 显示总分
  const banner = document.getElementById('score-banner');
  banner.style.display = 'block';
  document.getElementById('score-num').textContent   = data.correct;
  document.getElementById('score-total').textContent = data.total;

  // 每题结果
  data.results.forEach((r, qi) => {
    // 填入用户答案（如果空白）
    r.user_blanks.forEach(b => {
      const inp = document.getElementById(`blank-${qi}-${b.idx}`);
      if (inp && !inp.value.trim()) inp.value = b.user === '(空)' ? '' : b.user;
      if (inp) {
        inp.classList.remove('correct', 'wrong');
        inp.classList.add(b.is_correct ? 'correct' : 'wrong');
        inp.readOnly = true;
      }
    });

    // 结果条
    const div = document.getElementById(`result-${qi}`);
    div.style.display = 'block';
    const correct_count = r.user_blanks.filter(b => b.is_correct).length;
    const total_count   = r.user_blanks.length;
    if (r.is_correct) {
      div.className = 'result-overlay result-correct';
      div.innerHTML = `✅ 完全正确！`;
    } else if (correct_count > 0) {
      div.className = 'result-overlay result-partial';
      div.innerHTML = r.user_blanks.map(b =>
        `<span class="blank-result ${b.is_correct ? 'correct' : 'wrong'}">${b.is_correct ? '✓' : '✗'} ${b.expected}</span>`
      ).join(' &nbsp; ') + `<br><span style="font-size:13px;margin-top:4px;display:inline-block">正确：${correct_count}/${total_count}</span>`;
    } else {
      div.className = 'result-overlay result-wrong';
      div.innerHTML = `✗ 错误 &nbsp; 正确答案：${r.user_blanks.map(b => b.expected).join(', ')}`;
    }
  });

  btn.textContent = '已完成';
}
</script>
</body>
</html>
