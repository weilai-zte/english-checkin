<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选择题练习 - 初一英语</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", sans-serif;
         background: linear-gradient(135deg, #11998e, #38ef7d);
         min-height: 100vh; padding: 20px; }
  .container { max-width: 480px; margin: 0 auto; }
  h1 { color: white; font-size: 22px; text-align: center; margin-bottom: 16px; }
  .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 16px;
          box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .progress-bar { background: #e0e0e0; border-radius: 8px; height: 8px; margin-bottom: 20px; }
  .progress-fill { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%;
                   border-radius: 8px; transition: width 0.3s; }
  .q-card { background: #f0f1f3; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .q-num { font-size: 12px; color: #777; margin-bottom: 6px; }
  .q-cn { font-size: 20px; color: #1a1a2e; margin-bottom: 6px; font-weight: bold; }
  .q-en { font-size: 22px; color: #1a1a2e; margin-bottom: 6px; font-weight: bold; }
  .q-pron { font-size: 13px; color: #666; margin-bottom: 14px; }
  .option { display: block; width: 100%; padding: 12px 16px; margin-bottom: 8px;
            border: 2px solid #e0e0e0; border-radius: 12px;
            font-size: 16px; cursor: pointer; text-align: left;
            background: white; transition: all 0.2s; font-family: inherit; }
  .option:hover { border-color: #667eea; background: #f0f4ff; }
  .option.selected { border-color: #667eea; background: #e8eaf6; }
  .option.correct { border-color: #4caf50; background: #e8f5e9; }
  .option.wrong { border-color: #f44336; background: #ffebee; }
  .option.disabled { pointer-events: none; }
  .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 14px;
         font-size: 18px; font-weight: bold; cursor: pointer; text-align: center;
         background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .result-card { border-radius: 14px; padding: 14px; margin-bottom: 10px; }
  .result-correct { background: #e8f5e9; border-left: 4px solid #4caf50; }
  .result-wrong { background: #ffebee; border-left: 4px solid #f44336; }
  .result-word { font-size: 16px; font-weight: bold; color: #333; }
  .result-cn { font-size: 14px; color: #666; margin-top: 2px; }
  .result-icon { font-size: 20px; margin-right: 8px; }
  .score-big { font-size: 64px; font-weight: bold; text-align: center;
                color: #667eea; margin-bottom: 8px; }
  .score-label { text-align: center; color: #555; font-size: 16px; margin-bottom: 20px; }
  .streak-badge { text-align: center; font-size: 20px; color: #e67e22; margin-top: 12px; }
  .speaker-btn { background: none; border: none; cursor: pointer; font-size: 28px; padding: 4px 8px; vertical-align: middle; }
  .speaker-btn:active { transform: scale(0.9); }
  .result-area { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>🧠 听音猜意</h1>

  <div id="exercise-area">
    <div class="card">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
      <div id="question-container"></div>
    </div>
    <button class="btn" id="next-btn" onclick="nextQuestion()" disabled>下一题 →</button>
  </div>

  <div id="result-area" class="result-area">
    <div class="card">
      <div class="score-big" id="score-num"></div>
      <div class="score-label">得分</div>
      <div id="result-list"></div>
      <a href="/" class="btn" style="margin-top:16px;">🏠 返回首页</a>
      <div class="streak-badge" id="streak-display"></div>
    </div>
  </div>
</div>

<script>
const questions = {{ questions|tojson }};
let qidx = 0;
let answers = {};
let answered = false;

function renderQuestion() {
  const q = questions[qidx];
  const pct = Math.round((qidx / questions.length) * 100);
  document.getElementById("progress-fill").style.width = pct + "%";

  const container = document.getElementById("question-container");
  const letters = ["A", "B", "C", "D"];
  // options: {display: 中文, value: 英文}
  let optionsHtml = q.options.map((opt, i) =>
    `<button class="option" data-value="${opt.value}" onclick="selectOption(this, '${opt.value.replace(/'/g, "\\'")}')">` +
    `<strong>${letters[i]}.</strong> ${opt.display}</button>`
  ).join("");

  container.innerHTML = `
    <div class="q-card">
      <div class="q-num">第 ${qidx + 1} 题 / 共 ${questions.length} 题 · [${q.topic}]</div>
      <div class="q-en">
        ${q.word}
        <button class="speaker-btn" onclick="speakWord('${q.word.replace(/'/g, "\\'")}')" title="听发音">🔊</button>
      </div>
      <div class="q-pron">${q.pron || ''}</div>
      ${optionsHtml}
    </div>
  `;
  document.getElementById("next-btn").disabled = true;
  document.getElementById("next-btn").textContent =
    qidx < questions.length - 1 ? "下一题 →" : "查看结果 ✅";
  answered = false;
}

function selectOption(el, word) {
  if (answered) return;
  answered = true;

  // 禁用并标记所有选项，防止多次选择和回车再次触发
  document.querySelectorAll(".option").forEach(btn => {
    btn.classList.add("disabled");
    btn.disabled = true;
    if (btn.dataset.value === questions[qidx].word) {
      btn.classList.add("correct");
    }
  });

  const isCorrect = word === questions[qidx].word;
  if (!isCorrect) {
    el.classList.add("wrong");
    // 显示正确答案
    document.querySelectorAll(".option").forEach(btn => {
      if (btn.dataset.value === questions[qidx].word) {
        btn.classList.add("correct");
      }
    });
  }

  answers[qidx] = word;
  document.getElementById("next-btn").disabled = false;
}

function nextQuestion() {
  if (qidx < questions.length - 1) {
    qidx++;
    renderQuestion();
  } else {
    showResults();
  }
}

async function showResults() {
  document.getElementById("exercise-area").style.display = "none";
  document.getElementById("result-area").style.display = "block";

  const res = await fetch("/quiz/check", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ answers: Object.values(answers) })
  });
  const json = await res.json();

  document.getElementById("score-num").textContent = json.correct + "/" + json.total;
  document.getElementById("streak-display").textContent =
    json.streak > 0 ? "🔥 连续 " + json.streak + " 天打卡！" : "";

  const list = document.getElementById("result-list");
  json.results.forEach((r, i) => {
    const cls = r.is_correct ? "result-correct" : "result-wrong";
    const icon = r.is_correct ? "✅" : "❌";
    list.innerHTML += `
      <div class="result-card ${cls}">
        <div class="result-word">
          ${icon} ${r.word}
          <button class="speaker-btn" onclick="speakWord('${r.word.replace(/'/g, "\\'")}')">🔊</button>
          <span style="font-size:14px;color:#888;">— ${r.cn}</span>
        </div>
        ${!r.is_correct ? `<div class="result-cn">你的答案：${r.user}</div>` : ""}
      </div>`;
  });
}

// ─── TTS: 使用 macOS say 命令服务端发音（/tts 端点） ───────────────────
function speakWord(word) {
  if (!word) return;
  // 清理词汇（去掉例句里的多余内容）
  const clean = word.trim().replace(/[\.\!\?\,]+$/, '');
  const audio = new Audio('/tts?word=' + encodeURIComponent(clean));
  audio.play().catch(() => {});
}

// ─── 兼容旧版浏览器：如果 /tts 失败，尝试 Web Speech API ───────────────
function speakWordFallback(word) {
  if (!window.speechSynthesis || !word) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(word.trim());
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.pitch = 1.1;
  window.speechSynthesis.speak(utter);
}

// ─── voicechanged 事件：确保语音列表加载后再尝试 Web Speech ──────────
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {
    const voices = window.speechSynthesis.getVoices();
    if (voices.length === 0) {
      // Web Speech API 没可用英文语音，后续请求 fallback 即可
      window.speechSynthesis = null;
    }
  };
}

renderQuestion();
</script>
</body>
</html>
