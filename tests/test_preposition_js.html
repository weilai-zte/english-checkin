-->
<script>
const questions = ["q1", "q2"];
const selected = {};
const container = { dataset: { question: "0" } };
const btn = { dataset: {} }; // BUG: dataset.q is undefined

// Wrong (current):

// });

// Fixed version:
function fixedSelectOption(btn, container) {
  const qid = parseInt(container.dataset.question);
  console.assert(!isNaN(qid), "qid should not be NaN");
  selected[qid] = btn.dataset.val;
}

// Test
const qid = parseInt(container.dataset.question);
console.assert(qid === 0, "qid should be 0, got: " + qid);
