<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成就 - 初一英语</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", sans-serif;
         background: linear-gradient(135deg, #11998e, #38ef7d); min-height: 100vh; padding: 20px; }
  .container { max-width: 480px; margin: 0 auto; }
  h1 { color: white; font-size: 22px; text-align: center; margin-bottom: 8px; }
  .progress { text-align: center; color: white; font-size: 14px; margin-bottom: 16px; opacity: 0.9; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .badge { background: #f5f5f7; border-radius: 14px; padding: 16px 12px; text-align: center;
           box-shadow: 0 2px 12px rgba(0,0,0,0.08); position: relative; overflow: hidden; }
  .badge.locked { opacity: 0.45; filter: grayscale(0.7); }
  .badge.locked::after {
    content: "🔒"; position: absolute; top: 8px; right: 10px; font-size: 14px; }
  .badge.unlocked { border: 2px solid #f1c40f; }
  .badge.unlocked::before {
    content: ""; position: absolute; top: -20px; right: -20px;
    width: 50px; height: 50px; background: #f1c40f;
    transform: rotate(45deg); opacity: 0.3; }
  .icon { font-size: 36px; margin-bottom: 6px; }
  .name { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 4px; }
  .desc { font-size: 11px; color: #777; line-height: 1.4; }
  .date { font-size: 10px; color: #999; margin-top: 6px; }
  .back-link { display: block; text-align: center; padding: 14px; color: white;
               text-decoration: none; font-size: 15px; margin-top: 16px; }
</style>
</head>
<body>
<div class="container">
  <h1>🏅 成就</h1>
  <div class="progress">已解锁 {{ unlocked }} / {{ total }}</div>

  <div class="grid">
    {% for a in achievements %}
    <div class="badge {% if a.unlocked %}unlocked{% else %}locked{% endif %}">
      <div class="icon">{{ a.icon }}</div>
      <div class="name">{{ a.name }}</div>
      <div class="desc">{{ a.desc }}</div>
      {% if a.unlocked_date %}<div class="date">{{ a.unlocked_date }}</div>{% endif %}
    </div>
    {% endfor %}
  </div>

  <a href="/" class="back-link">← 返回首页</a>
</div>
</body>
</html>
