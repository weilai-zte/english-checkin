<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⏱ 时态练习</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", sans-serif;
         background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
         min-height: 100vh; padding: 20px; }
  .container { max-width: 480px; margin: 0 auto; }
  h1 { color: white; font-size: 22px; text-align: center; margin-bottom: 20px; }
  .q-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .q-num { font-size: 12px; color: #aaa; margin-bottom: 8px; }
  .q-text { font-size: 17px; color: #1a1a2e; margin-bottom: 14px; line-height: 1.6; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt { padding: 10px 16px; border: 2px solid #e8ecf4; border-radius: 10px;
         font-size: 16px; cursor: pointer; transition: all 0.15s;
         background: white; text-align: left; color: #333; }
  .opt:hover { border-color: #667eea; background: #f5f0ff; }
  .opt.selected { border-color: #667eea; background: #667eea; color: white; }
  .submit-btn { display: block; width: 100%; padding: 16px; border: none;
                border-radius: 14px; background: linear-gradient(135deg, #667eea, #764ba2);
                color: white; font-size: 18px; font-weight: bold; cursor: pointer;
                margin-top: 16px; }
  .submit-btn:active { transform: scale(0.98); }
  .result-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 14px; }
  .result-q { font-size: 14px; color: #666; margin-bottom: 6px; }
  .result-a { font-size: 16px; color: #1a1a2e; margin-bottom: 4px; }
  .result-ok { color: #27ae60; font-weight: bold; }
  .result-fail { color: #e74c3c; font-weight: bold; }
  .result-hint { font-size: 12px; color: #aaa; margin-top: 4px; }
  .score-badge { background: linear-gradient(135deg, #667eea, #764ba2);
                 color: white; border-radius: 16px; padding: 24px; text-align: center;
                 margin-bottom: 16px; font-size: 22px; font-weight: bold; }
  a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <h1>⏱ 时态专项练习</h1>

  <div id="quiz-area">
    {% for q in questions %}
    <div class="q-card">
      <div class="q-num">{{ q.grammar_title }} · 第 {{ loop.index }} / {{ questions|length }} 题</div>
      <div class="q-text">{{ q.question }}</div>
      <div class="options" id="opts-{{ loop.index0 }}" data-question="{{ loop.index0 }}">
        {% for opt in q.options %}
        <div class="opt" data-val="{{ opt }}">{{ opt }}</div>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
    <button class="submit-btn" onclick="submitAll()">提交答案</button>
  </div>

  <div id="result-area" style="display:none;">
    <div class="score-badge" id="score-badge"></div>
    <div id="results-list"></div>
    <button class="submit-btn" onclick="window.location.reload()">再做一次</button>
    <div style="text-align:center;margin-top:16px;"><a href="/">← 返回首页</a></div>
  </div>
</div>

<script>
const questions = {{ questions|tojson }};
// 每个问题只保留一个已选选项（彻底防止多选）
const selected = {};

document.querySelectorAll('.opt').forEach(btn => {
  btn.addEventListener('click', () => {
    // data-question 在父级 .options 容器上，不是 .opt 按钮上
    const qid = parseInt(btn.closest('.options').dataset.question);
    btn.closest('.options').querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selected[qid] = btn.dataset.val;
  });
});

function submitAll() {
  // 验证：每题都必须选择
  const unanswered = questions.filter((_, i) => !selected[i]);
  if (unanswered.length > 0) {
    alert('请完成所有题目！还有 ' + unanswered.length + ' 题未选择。');
    return;
  }
  const answers = questions.map((_, i) => selected[i] || "");
  fetch("/tense/check", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ answers })
  }).then(r => r.json()).then(data => showResults(data));
}

function showResults(data) {
  document.getElementById("quiz-area").style.display = "none";
  document.getElementById("result-area").style.display = "block";
  const pct = Math.round(data.correct / data.total * 100);
  document.getElementById("score-badge").textContent =
    '🎯 得分：' + data.correct + '/' + data.total + '（' + pct + '%）';

  let html = "";
  data.results.forEach(r => {
    const cls = r.is_correct ? "result-ok" : "result-fail";
    const icon = r.is_correct ? "✅" : "❌";
    html += '<div class="result-card">' +
      '<div class="result-q">' + r.question + '</div>' +
      '<div class="result-a ' + cls + '">' + icon + ' 正确答案：' + r.answer + '</div>' +
      (!r.is_correct ? '<div class="result-a">你的答案：' + r.user + '</div>' : '') +
      '<div class="result-hint">💡 ' + r.hint + '</div>' +
    '</div>';
  });
  document.getElementById("results-list").innerHTML = html;
}
</script>
</body>
</html>
